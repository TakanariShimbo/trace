name: Deploy to GitHub Pages

# main への push でビルドし、GitHub Pages へ公開する。
# リポジトリの Settings > Pages で「Source: GitHub Actions」を選んでおくこと。

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# 同時実行を1本に絞る（進行中のデプロイはキャンセルしない）。
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # プロジェクトページ (https://<user>.github.io/<repo>/) 用に base を設定。
      # カスタムドメインや <user>.github.io リポジトリの場合は VITE_BASE=/ にする。
      - name: Build
        env:
          VITE_BASE: /${{ github.event.repository.name }}/
        run: npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
